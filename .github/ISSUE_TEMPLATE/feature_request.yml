name: 💡 Feature request
description: Suggest an idea or improvement for an ALbuild component.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ALbuild! Please **search existing requests** first — if one
        already matches, add a 👍 and a comment instead of opening a new one.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which ALbuild component should this affect?
      options:
        - ALbuild.powershell (PowerShell module)
        - ALbuild.vscode (VS Code extension)
        - ALbuild.pipeline (Azure DevOps extension)
        - Not sure / cross-cutting
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behaviour you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you weighed.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
